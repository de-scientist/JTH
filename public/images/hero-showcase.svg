<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#004AAD" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#FF7A1A" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#004AAD"/>
      <stop offset="1" stop-color="#003380"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="300" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF7A1A"/>
      <stop offset="1" stop-color="#E5650A"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="100" fill="#004AAD" opacity="0.2" filter="url(#blur)"/>
  <circle cx="650" cy="480" r="120" fill="#FF7A1A" opacity="0.15" filter="url(#blur)"/>
  <rect x="80" y="100" width="320" height="220" rx="24" fill="url(#card1)" opacity="0.9"/>
  <rect x="120" y="280" width="280" height="180" rx="20" fill="#FFFFFF" opacity="0.95"/>
  <rect x="400" y="160" width="300" height="200" rx="24" fill="url(#card2)" opacity="0.85"/>
  <rect x="440" y="320" width="260" height="160" rx="20" fill="#101828" opacity="0.08"/>
  <circle cx="200" cy="200" r="40" fill="#FFFFFF" opacity="0.3"/>
  <rect x="160" y="320" width="120" height="8" rx="4" fill="#004AAD" opacity="0.4"/>
  <rect x="160" y="340" width="200" height="6" rx="3" fill="#64748B" opacity="0.3"/>
  <rect x="480" y="380" width="160" height="6" rx="3" fill="#64748B" opacity="0.25"/>
</svg>
